spring.application.name=van-phong-pham

# 1. Ket noi SQL Server
# Luu y: databaseName phai khop voi ten trong anh la HUIT_Stationery_java
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HUIT_Stationery_java;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
# Thay mat khau duoi day bang mat khau cua tai khoan sa tren may ban
spring.datasource.password=123
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 2. Cau hinh JPA/Hibernate
spring.jpa.show-sql=true
# Su dung 'update' de giu nguyen va cap nhat CSDL khi khoi dong lai
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.use_nationalized_character_data=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Chay cong 8080
server.port=8080

# 4. File upload config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Upload directory
app.upload.dir=uploads/images
# 5. Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=huitstationery@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 6. VNPay Configuration
vnpay.tmnCode=VNPAY_TMN_CODE
vnpay.hashSecret=VNPAY_HASH_SECRET
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=http://localhost:8080/api/payment/vnpay_return
vnpay.api.url=https://sandbox.vnpayment.vn/merchant_webapi/api/transaction

# 7. OAuth2 Google Login
spring.security.oauth2.client.registration.google.client-id=GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email

spring.application.name=van-phong-pham

# 1. Ket noi SQL Server
# Luu y: databaseName phai khop voi ten trong anh la HUIT_Stationery_java
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HUIT_Stationery_java;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
# Thay mat khau duoi day bang mat khau cua tai khoan sa tren may ban
spring.datasource.password=123
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 2. Cau hinh JPA/Hibernate
spring.jpa.show-sql=true
# Su dung 'create' de khoi tao lai bang voi kieu NVARCHAR, sau do co the doi ve 'update'
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.use_nationalized_character_data=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Chay cong 8080
server.port=8080

# 4. File upload config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Upload directory
app.upload.dir=uploads/images

spring.jpa.hibernate.ddl-auto=update
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân | Văn phòng phẩm HUIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0B3C8C',
                        secondary: '#1E5BB8',
                        accent: '#4DA3FF',
                        appBg: '#F5F9FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @reference "tailwindcss";
        @theme {
            --color-primary: #0B3C8C;
            --color-secondary: #1E5BB8;
            --color-accent: #4DA3FF;
            --color-app-bg: #F5F9FF;
        }
    </style>
</head>
<body class="bg-app-bg text-slate-800 font-sans">
<!-- HEADER FROM layout.html -->

<!-- MOBILE MENU BUTTON -->
<button id="mobile-menu-btn" class="fixed top-4 left-4 z-[60] p-2 bg-white rounded-xl shadow-lg border border-slate-100 block md:hidden active:scale-95 transition-all">
    <i data-lucide="menu" class="w-6 h-6 text-primary"></i>
</button>

<!-- MOBILE SIDEBAR -->
<aside id="mobile-sidebar" class="fixed top-0 left-0 h-full w-72 bg-white z-[70] -translate-x-full transition-transform duration-300 shadow-2xl p-6 flex flex-col">
    <div class="flex justify-between items-center mb-10">
        <a href="home.html" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
                <i data-lucide="pen-tool" class="text-white w-5 h-5"></i>
            </div>
            <span class="text-xl font-bold text-primary">HUIT</span>
        </a>
        <button id="close-sidebar" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
            <i data-lucide="x" class="w-6 h-6 text-slate-400"></i>
        </button>
    </div>

    <nav class="flex-1 space-y-2">
        <a href="home.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-all font-medium">
            <i data-lucide="home" class="w-5 h-5"></i>
            Trang chủ
        </a>
        <a href="danh-sach-san-pham.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-all font-medium">
            <i data-lucide="package" class="w-5 h-5"></i>
            Sản phẩm
        </a>
        <a href="gio-hang.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-all font-medium">
            <i data-lucide="shopping-cart" class="w-5 h-5"></i>
            Giỏ hàng
        </a>
        <a href="lich-su-mua-hang.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-all font-medium">
            <i data-lucide="history" class="w-5 h-5"></i>
            Đơn hàng
        </a>
        <a href="ho-so.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-all font-medium">
            <i data-lucide="user" class="w-5 h-5"></i>
            Tài khoản
        </a>
    </nav>

    <div class="pt-6 border-t border-slate-100">
        <a href="login.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 transition-all font-bold">
            <i data-lucide="log-out" class="w-5 h-5"></i>
            Đăng xuất
        </a>
    </div>
</aside>

<!-- OVERLAY -->
<div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 z-[65] hidden backdrop-blur-sm transition-all"></div>

<!-- MAIN CONTENT HERE -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="flex flex-col lg:flex-row gap-12">
        <!-- Sidebar -->
        <aside class="w-full lg:w-72 space-y-8">
            <div class="flex items-center gap-4 px-4" th:if="${user != null}">
                <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-lg shadow-primary/20">
                    <span th:text="${#strings.substring(user.ho_ten, 0, 2).toUpperCase()}">NA</span>
                </div>
                <div>
                    <h2 class="font-bold text-slate-900" th:text="${user.ho_ten}">Nguyễn Văn A</h2>
                    <p class="text-sm text-slate-500">Thành viên Bạc</p>
                </div>
            </div>

            <nav class="space-y-2">
                <a th:href="@{/profile}" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/5 text-primary font-bold transition-all">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    Thông tin cá nhân
                </a>
                <a th:href="@{/orders}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-primary transition-all font-medium">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    Lịch sử mua hàng
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-primary transition-all font-medium">
                    <i data-lucide="heart" class="w-5 h-5"></i>
                    Sản phẩm yêu thích
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-primary transition-all font-medium">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    Thông báo
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-primary transition-all font-medium">
                    <i data-lucide="shield" class="w-5 h-5"></i>
                    Bảo mật
                </a>
                <div class="pt-4 mt-4 border-t border-slate-100">
                    <a th:href="@{/logout}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 hover:text-red-600 transition-all font-medium">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                        Đăng xuất
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Content -->
        <div class="flex-1 space-y-8">
            <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 space-y-8">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-slate-900">Thông tin cá nhân</h2>
                    <button class="text-primary font-bold hover:underline">Chỉnh sửa</button>
                </div>

                <div class="grid sm:grid-cols-2 gap-8" th:if="${user != null}">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Họ và tên</label>
                        <input type="text" th:value="${user.ho_ten}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all" readonly>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Email</label>
                        <input type="email" th:value="${user.email}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all" readonly>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Số điện thoại</label>
                        <input type="tel" th:value="${user.so_dien_thoai}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all" readonly>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Vai trò</label>
                        <input type="text" th:value="${user.vaiTro != null ? user.vaiTro.ten_vaitro : 'Người dùng'}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all" readonly>
                    </div>
                    <div class="sm:col-span-2 space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">ID người dùng</label>
                        <input type="text" th:value="'#' + ${user.id_nguoidung}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all" readonly>
                    </div>
                </div>
                <div th:if="${user == null}" class="text-center py-8">
                    <p class="text-slate-500">Không tìm thấy thông tin người dùng</p>
                </div>
            </section>

            <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 space-y-6">
                <h2 class="text-2xl font-bold text-slate-900">Thống kê mua sắm</h2>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                    <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100 space-y-2">
                        <div class="text-slate-500 text-sm font-medium">Tổng đơn hàng</div>
                        <div class="text-3xl font-black text-primary">0</div>
                    </div>
                    <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100 space-y-2">
                        <div class="text-slate-500 text-sm font-medium">Đã chi tiêu</div>
                        <div class="text-3xl font-black text-primary">0đ</div>
                    </div>
                    <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100 space-y-2">
                        <div class="text-slate-500 text-sm font-medium">Điểm tích lũy</div>
                        <div class="text-3xl font-black text-accent">0</div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>
<!-- FOOTER FROM layout.html -->

<script>
    lucide.createIcons();

    // Mobile Menu Logic
    const menuBtn = document.getElementById('mobile-menu-btn');
    const closeBtn = document.getElementById('close-sidebar');
    const sidebar = document.getElementById('mobile-sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    function toggleMenu() {
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
        document.body.classList.toggle('overflow-hidden');
    }

    menuBtn.addEventListener('click', toggleMenu);
    closeBtn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);
</script>
</body>
</html>

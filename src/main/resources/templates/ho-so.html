<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Hồ sơ cá nhân', ~{::div#profile-content})}">
<body>
<div id="profile-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <!-- Success/Error Messages -->
    <div th:if="${success}" class="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-xl flex items-center gap-3">
        <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-center gap-3">
        <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${error}"></span>
    </div>

    <div class="flex flex-col lg:flex-row gap-12">
        <!-- Sidebar -->
        <aside class="w-full lg:w-72 space-y-8">
            <div class="flex items-center gap-4 px-4" th:if="${user != null}">
                <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-lg shadow-primary/20">
                    <span th:text="${#strings.substring(user.ho_ten, 0, 2).toUpperCase()}">NA</span>
                </div>
                <div>
                    <h2 class="font-bold text-slate-900" th:text="${user.ho_ten}">Nguyễn Văn A</h2>
                    <p class="text-xs text-slate-500" th:text="${user.vaiTro != null ? user.vaiTro.ten_vaitro : 'Khách hàng'}">Thành viên</p>
                </div>
            </div>

            <nav class="space-y-2">
                <a th:href="@{/profile}" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/5 text-primary font-bold transition-all">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    Thông tin cá nhân
                </a>
                <a th:href="@{/orders}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-primary transition-all font-medium">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    Lịch sử mua hàng
                </a>
                <div class="pt-4 mt-4 border-t border-slate-100">
                    <form th:action="@{/logout}" method="POST" class="block w-full">
                        <button type="submit" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 hover:text-red-600 transition-all font-bold w-full text-left">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                            Đăng xuất
                        </button>
                    </form>
                </div>
            </nav>
        </aside>

        <!-- Content -->
        <div class="flex-1 space-y-8">
            <!-- Form cập nhật thông tin -->
            <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 space-y-8">
                <h2 class="text-2xl font-bold text-slate-900 border-b border-slate-100 pb-4">Thông tin cá nhân</h2>
                
                <form th:action="@{/profile/update}" method="POST" class="space-y-6" th:if="${user != null}">
                    <div class="grid sm:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Họ và tên</label>
                            <input type="text" name="ho_ten" th:value="${user.ho_ten}" required 
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Email (Đăng nhập)</label>
                            <input type="email" th:value="${user.email}" readonly 
                                   class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl outline-none text-slate-500">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Số điện thoại</label>
                            <input type="tel" name="so_dien_thoai" th:value="${user.so_dien_thoai}" required 
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Vai trò</label>
                            <input type="text" th:value="${user.vaiTro != null ? user.vaiTro.ten_vaitro : 'Người dùng'}" readonly 
                                   class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl outline-none text-slate-500">
                        </div>
                        <div class="sm:col-span-2 space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Địa chỉ mặc định</label>
                            <textarea name="dia_chi" rows="2" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all" th:text="${user.dia_chi}"></textarea>
                        </div>
                    </div>
                    <div class="flex justify-end pt-4">
                        <button type="submit" class="bg-primary hover:bg-secondary text-white px-6 py-3 rounded-xl font-bold transition-all shadow-md shadow-primary/20 active:scale-95 text-sm flex items-center gap-2">
                            <i data-lucide="save" class="w-4 h-4"></i>
                            Lưu thay đổi
                        </button>
                    </div>
                </form>
                <div th:if="${user == null}" class="text-center py-8">
                    <p class="text-slate-500">Không tìm thấy thông tin người dùng</p>
                </div>
            </section>

            <!-- Form đổi mật khẩu -->
            <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 space-y-6">
                <h2 class="text-2xl font-bold text-slate-900 border-b border-slate-100 pb-4">Đổi mật khẩu</h2>
                
                <form th:action="@{/profile/change-password}" method="POST" class="space-y-6">
                    <div class="grid sm:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Mật khẩu hiện tại</label>
                            <input type="password" name="currentPassword" required 
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Mật khẩu mới</label>
                            <input type="password" name="newPassword" required placeholder="Tối thiểu 6 ký tự" 
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Xác nhận mật khẩu</label>
                            <input type="password" name="confirmPassword" required 
                                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                        </div>
                    </div>
                    <div class="flex justify-end pt-4">
                        <button type="submit" class="bg-slate-950 hover:bg-slate-800 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-md active:scale-95 text-sm flex items-center gap-2">
                            <i data-lucide="key-round" class="w-4 h-4"></i>
                            Đổi mật khẩu
                        </button>
                    </div>
                </form>
            </section>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Văn phòng phẩm HUIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0B3C8C',
                        secondary: '#1E5BB8',
                        accent: '#4DA3FF',
                        appBg: '#F5F9FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @reference "tailwindcss";
        @theme {
            --color-primary: #0B3C8C;
            --color-secondary: #1E5BB8;
            --color-accent: #4DA3FF;
            --color-app-bg: #F5F9FF;
        }
    </style>
</head>
<body class="bg-app-bg text-slate-800 font-sans">
<!-- HEADER FROM layout.html -->

<!-- MOBILE MENU BUTTON -->
<button id="mobile-menu-btn" class="fixed top-4 left-4 z-[60] p-2 bg-white rounded-xl shadow-lg border border-slate-100 block md:hidden active:scale-95 transition-all">
    <i data-lucide="menu" class="w-6 h-6 text-primary"></i>
</button>

<!-- MOBILE SIDEBAR -->
<aside id="mobile-sidebar" class="fixed top-0 left-0 h-full w-72 bg-white z-[70] -translate-x-full transition-transform duration-300 shadow-2xl p-6 flex flex-col">
    <div class="flex justify-between items-center mb-10">
        <a href="home.html" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
                <i data-lucide="pen-tool" class="text-white w-5 h-5"></i>
            </div>
            <span class="text-xl font-bold text-primary">HUIT</span>
        </a>
        <button id="close-sidebar" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
            <i data-lucide="x" class="w-6 h-6 text-slate-400"></i>
        </button>
    </div>

    <nav class="flex-1 space-y-2">
        <a href="home.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-all font-medium">
            <i data-lucide="home" class="w-5 h-5"></i>
            Trang chủ
        </a>
        <a href="danh-sach-san-pham.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-all font-medium">
            <i data-lucide="package" class="w-5 h-5"></i>
            Sản phẩm
        </a>
        <a href="gio-hang.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-all font-medium">
            <i data-lucide="shopping-cart" class="w-5 h-5"></i>
            Giỏ hàng
        </a>
        <a href="lich-su-mua-hang.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-all font-medium">
            <i data-lucide="history" class="w-5 h-5"></i>
            Đơn hàng
        </a>
        <a href="ho-so.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-all font-medium">
            <i data-lucide="user" class="w-5 h-5"></i>
            Tài khoản
        </a>
    </nav>

    <div class="pt-6 border-t border-slate-100">
        <a href="login.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 transition-all font-bold">
            <i data-lucide="log-out" class="w-5 h-5"></i>
            Đăng xuất
        </a>
    </div>
</aside>

<!-- OVERLAY -->
<div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 z-[65] hidden backdrop-blur-sm transition-all"></div>

<!-- MAIN CONTENT HERE -->
<div class="min-h-screen flex items-center justify-center p-4 py-12">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center space-y-4">
            <a href="index.html" class="inline-flex items-center gap-2">
                <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/30">
                    <i data-lucide="pen-tool" class="text-white w-7 h-7"></i>
                </div>
                <span class="text-3xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">HUIT Stationery</span>
            </a>
            <h1 class="text-3xl font-black text-slate-900">Tạo tài khoản mới</h1>
            <p class="text-slate-500">Tham gia cùng cộng đồng HUIT Stationery ngay hôm nay</p>
        </div>

        <!-- Success/Error Messages -->
        <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl">
            <div class="flex items-center gap-3">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>
                <p class="text-red-700 font-medium" th:text="${error}"></p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl shadow-primary/5 border border-slate-100 space-y-6">
            <form th:action="@{/register}" th:object="${user}" method="post" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-widest">Họ và tên</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="text" th:field="*{ho_ten}" placeholder="Nguyễn Văn A" required class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-widest">Email</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="email" th:field="*{email}" placeholder="example@gmail.com" required class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-widest">Mật khẩu</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="password" th:field="*{mat_khau}" placeholder="••••••••" required class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-widest">Số điện thoại</label>
                    <div class="relative">
                        <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="tel" th:field="*{so_dien_thoai}" placeholder="09xxxxxxxx" class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                    </div>
                </div>
                <div class="flex items-start gap-2">
                    <input type="checkbox" id="terms" name="terms" required class="mt-1 w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
                    <label for="terms" class="text-sm text-slate-600 cursor-pointer">
                        Tôi đồng ý với <a href="#" class="text-primary font-bold hover:underline">Điều khoản dịch vụ</a> và <a href="#" class="text-primary font-bold hover:underline">Chính sách bảo mật</a>
                    </label>
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-secondary text-white py-4 rounded-xl font-bold transition-all shadow-lg shadow-primary/20 active:scale-95">Đăng ký tài khoản</button>
            </form>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-4 text-slate-400 font-bold">Hoặc đăng ký với</span></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center gap-2 py-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors font-bold text-sm">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
                    Google
                </button>
                <button class="flex items-center justify-center gap-2 py-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors font-bold text-sm">
                    <i data-lucide="github" class="w-5 h-5"></i>
                    GitHub
                </button>
            </div>
        </div>

        <p class="text-center text-slate-600">
            Đã có tài khoản?
            <a th:href="@{/login}" class="text-primary font-bold hover:underline">Đăng nhập ngay</a>
        </p>
    </div>

</div>
<!-- FOOTER FROM layout.html -->

<script>
    lucide.createIcons();

    // Mobile Menu Logic
    const menuBtn = document.getElementById('mobile-menu-btn');
    const closeBtn = document.getElementById('close-sidebar');
    const sidebar = document.getElementById('mobile-sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    function toggleMenu() {
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
        document.body.classList.toggle('overflow-hidden');
    }

    menuBtn.addEventListener('click', toggleMenu);
    closeBtn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);
</script>
</body>
</html>

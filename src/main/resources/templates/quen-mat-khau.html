<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu | Văn Phòng Phẩm Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0B3C8C',
                        secondary: '#1E5BB8',
                        accent: '#4DA3FF',
                        appBg: '#F5F9FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-appBg text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full">
    <div class="text-center mb-8">
        <a th:href="@{/home}" class="inline-flex items-center gap-2 mb-4">
            <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center shadow-xl shadow-primary/30">
                <i data-lucide="pen-tool" class="text-white w-7 h-7"></i>
            </div>
            <span class="text-3xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">Văn Phòng Phẩm Online</span>
        </a>
        <h1 class="text-3xl font-bold text-slate-900 mb-2">Đặt lại mật khẩu</h1>
        <p class="text-slate-500">Nhập email và mật khẩu mới để đổi mật khẩu trực tiếp.</p>
    </div>

    <!-- Alert Messages -->
    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-center gap-3">
        <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-xl flex items-center gap-3">
        <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${success}"></span>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
        <form th:action="@{/quen-mat-khau}" method="POST" class="space-y-5">
            <!-- Email -->
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Email của tài khoản</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="email" name="email" required placeholder="name@example.com" 
                           class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                </div>
            </div>

            <!-- New Password -->
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Mật khẩu mới</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="password" name="newPassword" required placeholder="Tối thiểu 6 ký tự" 
                           class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Xác nhận mật khẩu mới</label>
                <div class="relative">
                    <i data-lucide="shield-check" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="password" name="confirmPassword" required placeholder="Nhập lại mật khẩu mới" 
                           class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all">
                </div>
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-secondary text-white py-4 rounded-xl font-bold transition-all shadow-lg shadow-primary/20 active:scale-95 mt-4">
                Cập nhật mật khẩu mới
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-slate-100 text-center">
            <a th:href="@{/login}" class="text-sm font-bold text-primary hover:text-secondary transition-colors inline-flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Quay lại đăng nhập
            </a>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>

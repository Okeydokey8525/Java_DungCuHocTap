<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Lịch sử mua hàng', ~{::div#orders-content})}">
<body>
<div id="orders-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <!-- Success/Error Messages -->
    <div th:if="${success}" class="mb-6 p-4 bg-green-50 border border-green-200 text-green-700 rounded-xl flex items-center gap-3">
        <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-center gap-3">
        <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${error}"></span>
    </div>

    <div class="flex flex-col lg:flex-row gap-12">
        <!-- Sidebar -->
        <aside class="w-full lg:w-72 space-y-8">
            <div class="flex items-center gap-4 px-4" th:if="${user != null}">
                <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center text-white text-2xl font-black shadow-lg shadow-primary/20">
                    <span th:text="${#strings.substring(user.ho_ten, 0, 2).toUpperCase()}">NA</span>
                </div>
                <div>
                    <h2 class="font-bold text-slate-900" th:text="${user.ho_ten}">Nguyễn Văn A</h2>
                    <p class="text-xs text-slate-500" th:text="${user.vaiTro != null ? user.vaiTro.ten_vaitro : 'Khách hàng'}">Thành viên</p>
                </div>
            </div>

            <nav class="space-y-2">
                <a th:href="@{/profile}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-primary transition-all font-medium">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    Thông tin cá nhân
                </a>
                <a th:href="@{/orders}" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/5 text-primary font-bold transition-all">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    Lịch sử mua hàng
                </a>
                <div class="pt-4 mt-4 border-t border-slate-100">
                    <form th:action="@{/logout}" method="POST" class="block w-full">
                        <button type="submit" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 hover:text-red-600 transition-all font-bold w-full text-left">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                            Đăng xuất
                        </button>
                    </form>
                </div>
            </nav>
        </aside>

        <!-- Content -->
        <div class="flex-1 space-y-8">
            <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 space-y-8">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <h2 class="text-2xl font-bold text-slate-900 pb-2">Lịch sử mua hàng</h2>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                        <tr class="text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="pb-4 font-bold">Mã đơn hàng</th>
                            <th class="pb-4 font-bold">Ngày đặt</th>
                            <th class="pb-4 font-bold">Tổng tiền</th>
                            <th class="pb-4 font-bold">Trạng thái</th>
                            <th class="pb-4 font-bold">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            <tr th:if="${listDonHang != null and !listDonHang.isEmpty()}" th:each="order : ${listDonHang}" class="group hover:bg-slate-50 transition-colors">
                                <td class="py-6 font-bold text-slate-900" th:text="'#' + ${order.id_donhang}">#DH001</td>
                                <td class="py-6 text-sm text-slate-500" th:text="${#temporals.format(order.ngayDat, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                                <td class="py-6 font-bold text-primary" th:text="${#numbers.formatDecimal(order.tong_tien, 0, 'COMMA', 0, 'POINT') + ' đ'}">0đ</td>
                                <td class="py-6">
                                    <span th:if="${order.trang_thai == 'Chờ xác nhận'}" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-yellow-100 text-yellow-600">
                                        Chờ xác nhận
                                    </span>
                                    <span th:if="${order.trang_thai == 'Đang xử lý' || order.trang_thai == 'Đã xác nhận'}" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-blue-100 text-blue-600">
                                        Đang xử lý
                                    </span>
                                    <span th:if="${order.trang_thai == 'Đang giao hàng'}" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-purple-100 text-purple-600">
                                        Đang giao hàng
                                    </span>
                                    <span th:if="${order.trang_thai == 'Đã giao' || order.trang_thai == 'Hoàn thành'}" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-green-100 text-green-600">
                                        Đã giao
                                    </span>
                                    <span th:if="${order.trang_thai == 'Đã hủy'}" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-red-100 text-red-600">
                                        Đã hủy
                                    </span>
                                </td>
                                <td class="py-6">
                                    <div class="flex items-center gap-3">
                                        <a th:href="@{/orders/detail(orderId=${order.id_donhang})}" class="text-primary font-bold text-sm hover:underline">Chi tiết</a>
                                        <button th:if="${order.trang_thai == 'Chờ xác nhận'}" 
                                                th:onclick="'confirmCancel(' + ${order.id_donhang} + ')'"
                                                class="text-red-500 font-bold text-sm hover:underline">Hủy đơn</button>
                                    </div>
                                </td>
                            </tr>
                            
                            <!-- Empty state -->
                            <tr th:if="${listDonHang == null or listDonHang.isEmpty()}">
                                <td colspan="5" class="py-12 text-center">
                                    <i data-lucide="shopping-bag" class="w-16 h-16 text-slate-300 mx-auto mb-4"></i>
                                    <h3 class="text-lg font-bold text-slate-900 mb-2">Chưa có đơn hàng nào</h3>
                                    <p class="text-slate-500 mb-6">Bạn chưa đặt mua sản phẩm nào</p>
                                    <a th:href="@{/home}" class="bg-primary hover:bg-secondary text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-primary/20 active:scale-95 inline-flex items-center gap-2">
                                        <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                                        Mua sắm ngay
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script>
        function confirmCancel(orderId) {
            if (confirm('Bạn có chắc muốn hủy đơn hàng này? Thao tác này không thể hoàn tác.')) {
                // Tạo form động gửi POST request để bảo mật (tránh CSRF và lỗi click nhầm GET)
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/orders/cancel';
                
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'orderId';
                input.value = orderId;
                
                form.appendChild(input);
                document.body.appendChild(form);
                form.submit();
            }
        }
    </script>
</div>
</body>
</html>

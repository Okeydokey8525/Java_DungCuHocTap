<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Lịch sử mua hàng</title>
</head>
<body>
<div layout:fragment="content" class="container">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <h4 class="fw-bold text-huit mb-4">LỊCH SỬ ĐƠN HÀNG</h4>
    <div class="table-responsive bg-white p-3 shadow-sm rounded">
        <table class="table table-hover mb-0">
            <thead class="table-light">
            <tr>
                <th>Mã Đơn</th>
                <th>Ngày Đặt</th>
                <th>Tổng Tiền</th>
                <th>Trạng Thái</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(listDonHang)}">
                <td colspan="4" class="text-center text-muted">Bạn chưa có đơn hàng nào.</td>
            </tr>
            <tr th:each="dh : ${listDonHang}">
                <td class="fw-bold" th:text="${dh.id_donhang}">101</td>
                <td th:text="${dh.ngayDat != null ? #temporals.format(dh.ngayDat, 'dd/MM/yyyy HH:mm') : '--'}">28/03/2026 10:30</td>
                <td class="text-danger fw-bold"
                    th:text="${#numbers.formatDecimal(dh.tong_tien, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</td>
                <td><span class="badge bg-success" th:text="${dh.trang_thai}">Chờ xác nhận</span></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Đăng nhập</title>
</head>
<body>
<div layout:fragment="content" class="container" style="max-width: 500px;">
    <div class="bg-white shadow-sm rounded p-4">
        <h4 class="fw-bold text-huit mb-3">ĐĂNG NHẬP</h4>

        <div th:if="${param.error}" class="alert alert-danger py-2">Email hoặc mật khẩu chưa đúng.</div>
        <div th:if="${param.logout}" class="alert alert-success py-2">Bạn đã đăng xuất thành công.</div>
        <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Email</label>
                <input id="username" name="username" type="email" class="form-control" placeholder="example@email.com" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mật khẩu</label>
                <input id="password" name="password" type="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-huit w-100">Đăng nhập</button>
        </form>

        <p class="small mt-3 mb-0">Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>.</p>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout-admin :: layout('Quản lý đơn hàng', ~{::div#donhang-content})}">
<body>
<div id="donhang-content" class="space-y-6">
    <!-- Messages -->
    <div th:if="${success}" class="p-4 bg-green-50 border border-green-200 text-green-700 rounded-xl flex items-center gap-3">
        <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-center gap-3">
        <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${error}"></span>
    </div>

    <!-- Filters & Actions -->
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 flex flex-wrap gap-4 items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="text-sm font-bold text-slate-500">Lọc theo trạng thái:</span>
            <div class="flex gap-2">
                <a th:href="@{/admin/don-hang(status='Tất cả')}"
                   th:class="${selectedStatus == 'Tất cả' ? 'px-4 py-2 bg-primary text-white rounded-xl font-bold text-xs shadow-sm shadow-primary/20' : 'px-4 py-2 bg-slate-50 border border-slate-200 text-slate-600 rounded-xl font-bold text-xs hover:bg-slate-100'}">Tất cả</a>
                <a th:href="@{/admin/don-hang(status='Chờ xác nhận')}"
                   th:class="${selectedStatus == 'Chờ xác nhận' ? 'px-4 py-2 bg-amber-500 text-white rounded-xl font-bold text-xs shadow-sm shadow-amber-500/20' : 'px-4 py-2 bg-slate-50 border border-slate-200 text-slate-600 rounded-xl font-bold text-xs hover:bg-slate-100'}">Chờ xác nhận</a>
                <a th:href="@{/admin/don-hang(status='Đã xác nhận')}"
                   th:class="${selectedStatus == 'Đã xác nhận' ? 'px-4 py-2 bg-blue-500 text-white rounded-xl font-bold text-xs shadow-sm shadow-blue-500/20' : 'px-4 py-2 bg-slate-50 border border-slate-200 text-slate-600 rounded-xl font-bold text-xs hover:bg-slate-100'}">Đã xác nhận</a>
                <a th:href="@{/admin/don-hang(status='Đang giao')}"
                   th:class="${selectedStatus == 'Đang giao' ? 'px-4 py-2 bg-indigo-500 text-white rounded-xl font-bold text-xs shadow-sm shadow-indigo-500/20' : 'px-4 py-2 bg-slate-50 border border-slate-200 text-slate-600 rounded-xl font-bold text-xs hover:bg-slate-100'}">Đang giao</a>
                <a th:href="@{/admin/don-hang(status='Hoàn thành')}"
                   th:class="${selectedStatus == 'Hoàn thành' ? 'px-4 py-2 bg-green-500 text-white rounded-xl font-bold text-xs shadow-sm shadow-green-500/20' : 'px-4 py-2 bg-slate-50 border border-slate-200 text-slate-600 rounded-xl font-bold text-xs hover:bg-slate-100'}">Hoàn thành</a>
                <a th:href="@{/admin/don-hang(status='Đã hủy')}"
                   th:class="${selectedStatus == 'Đã hủy' ? 'px-4 py-2 bg-red-500 text-white rounded-xl font-bold text-xs shadow-sm shadow-red-500/20' : 'px-4 py-2 bg-slate-50 border border-slate-200 text-slate-600 rounded-xl font-bold text-xs hover:bg-slate-100'}">Đã hủy</a>
            </div>
        </div>
    </div>

    <!-- Order Table -->
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                <tr class="text-left text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100">
                    <th class="pb-4 px-4">Mã đơn</th>
                    <th class="pb-4 px-4">Khách hàng</th>
                    <th class="pb-4 px-4">Ngày đặt</th>
                    <th class="pb-4 px-4">Phương thức</th>
                    <th class="pb-4 px-4">Tổng tiền</th>
                    <th class="pb-4 px-4">Trạng thái</th>
                    <th class="pb-4 px-4 text-center">Cập nhật trạng thái</th>
                    <th class="pb-4 px-4 text-right">Chi tiết</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                <tr th:each="order : ${orders}" class="text-sm group hover:bg-slate-50 transition-colors">
                    <td class="py-4 px-4 font-bold text-primary" th:text="'#' + ${order.id_donhang}">#000</td>
                    <td class="py-4 px-4">
                        <p class="font-bold text-slate-900" th:text="${order.nguoiDung.ho_ten}">Họ tên</p>
                        <p class="text-xs text-slate-400" th:text="${order.nguoiDung.so_dien_thoai}">SĐT</p>
                    </td>
                    <td class="py-4 px-4 text-slate-500" th:text="${#temporals.format(order.ngayDat, 'dd/MM/yyyy HH:mm')}">Ngày</td>
                    <td class="py-4 px-4 text-slate-600 font-medium" th:text="${order.phuongThucThanhToan}">COD</td>
                    <td class="py-4 px-4 font-bold text-slate-900" th:text="${#numbers.formatDecimal(order.tong_tien, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                    <td class="py-4 px-4">
                        <span th:text="${order.trang_thai}"
                              th:class="${order.trang_thai == 'Chờ xác nhận' ? 'px-2 py-1 bg-amber-100 text-amber-600 rounded-full text-[10px] font-bold uppercase' : 
                                         (order.trang_thai == 'Đã xác nhận' ? 'px-2 py-1 bg-blue-100 text-blue-600 rounded-full text-[10px] font-bold uppercase' : 
                                         (order.trang_thai == 'Đang giao' ? 'px-2 py-1 bg-indigo-100 text-indigo-600 rounded-full text-[10px] font-bold uppercase' : 
                                         (order.trang_thai == 'Hoàn thành' ? 'px-2 py-1 bg-green-100 text-green-600 rounded-full text-[10px] font-bold uppercase' : 
                                         'px-2 py-1 bg-red-100 text-red-600 rounded-full text-[10px] font-bold uppercase')))}">
                            Trạng thái
                        </span>
                    </td>
                    
                    <!-- Cập nhật nhanh trạng thái -->
                    <td class="py-4 px-4 text-center">
                        <form th:action="@{/admin/don-hang/update-status}" method="POST" class="inline-flex gap-1.5 justify-center">
                            <input type="hidden" name="orderId" th:value="${order.id_donhang}">
                            
                            <!-- Nút Xác nhận -->
                            <button type="submit" name="status" value="Đã xác nhận" th:if="${order.trang_thai == 'Chờ xác nhận'}"
                                    class="px-2 py-1.5 bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold rounded-lg transition-all active:scale-95">
                                Xác nhận
                            </button>
                            
                            <!-- Nút Giao hàng -->
                            <button type="submit" name="status" value="Đang giao" th:if="${order.trang_thai == 'Đã xác nhận'}"
                                    class="px-2 py-1.5 bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-bold rounded-lg transition-all active:scale-95">
                                Giao hàng
                            </button>
                            
                            <!-- Nút Hoàn thành -->
                            <button type="submit" name="status" value="Hoàn thành" th:if="${order.trang_thai == 'Đang giao'}"
                                    class="px-2 py-1.5 bg-green-500 hover:bg-green-600 text-white text-xs font-bold rounded-lg transition-all active:scale-95">
                                Hoàn thành
                            </button>
                            
                            <!-- Nút Hủy đơn (cho phép nếu chưa giao/hoàn thành) -->
                            <button type="submit" name="status" value="Đã hủy" th:if="${order.trang_thai == 'Chờ xác nhận' || order.trang_thai == 'Đã xác nhận'}"
                                    onclick="return confirm('Bạn có chắc chắn muốn hủy đơn hàng này?')"
                                    class="px-2 py-1.5 bg-red-100 hover:bg-red-200 text-red-600 text-xs font-bold rounded-lg transition-all active:scale-95">
                                Hủy đơn
                            </button>
                            
                            <span th:if="${order.trang_thai == 'Hoàn thành' || order.trang_thai == 'Đã hủy'}" class="text-xs text-slate-400 italic">Không khả dụng</span>
                        </form>
                    </td>
                    
                    <!-- Xem chi tiết -->
                    <td class="py-4 px-4 text-right">
                        <a th:href="@{/admin/don-hang/detail(id=${order.id_donhang})}" class="p-2 text-slate-400 hover:text-primary transition-colors bg-slate-50 rounded-xl hover:bg-white border border-slate-100 shadow-sm inline-block">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="8" class="py-8 text-center text-slate-400">Không tìm thấy đơn hàng nào thuộc trạng thái này.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

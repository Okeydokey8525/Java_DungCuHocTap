<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout-admin :: layout('Quản lý đánh giá', ~{::div#danhgia-content})}">
<body>
<div id="danhgia-content" class="space-y-6">
    <!-- Messages -->
    <div th:if="${success}" class="p-4 bg-green-50 border border-green-200 text-green-700 rounded-xl flex items-center gap-3">
        <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-center gap-3">
        <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${error}"></span>
    </div>

    <!-- Review List Card -->
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 overflow-hidden">
        <h3 class="font-bold text-slate-900 text-lg mb-6">Đánh giá và phản hồi của khách hàng</h3>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                <tr class="text-left text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100">
                    <th class="pb-4 px-4">Sản phẩm</th>
                    <th class="pb-4 px-4">Khách hàng</th>
                    <th class="pb-4 px-4">Đánh giá sao</th>
                    <th class="pb-4 px-4">Nội dung</th>
                    <th class="pb-4 px-4">Ngày gửi</th>
                    <th class="pb-4 px-4">Trạng thái duyệt</th>
                    <th class="pb-4 px-4 text-right">Thao tác</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                <tr th:each="dg : ${reviews}" class="text-sm group hover:bg-slate-50 transition-colors">
                    <!-- Sản phẩm -->
                    <td class="py-4 px-4">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-slate-100 rounded-lg overflow-hidden shrink-0 border border-slate-100">
                                <img th:src="${dg.sanPham.hinh_anh != null ? dg.sanPham.hinh_anh : '/images/default-product.jpg'}" alt="Image" class="w-full h-full object-cover">
                            </div>
                            <div class="min-w-0 max-w-[150px]">
                                <p class="font-semibold text-slate-800 truncate" th:text="${dg.sanPham.ten_sanpham}">Tên SP</p>
                                <p class="text-[10px] text-slate-400" th:text="'SP-' + ${dg.sanPham.id_sanpham}">ID</p>
                            </div>
                        </div>
                    </td>

                    <!-- Người dùng -->
                    <td class="py-4 px-4">
                        <p class="font-bold text-slate-900" th:text="${dg.nguoiDung.ho_ten}">Họ tên</p>
                        <p class="text-xs text-slate-400" th:text="${dg.nguoiDung.email}">Email</p>
                    </td>

                    <!-- Số sao -->
                    <td class="py-4 px-4 text-amber-500">
                        <div class="flex items-center gap-0.5">
                            <i data-lucide="star" class="w-4 h-4 fill-amber-500 text-amber-500" 
                               th:each="i : ${#numbers.sequence(1, dg.so_sao)}"></i>
                            <i data-lucide="star" class="w-4 h-4 text-slate-200" 
                               th:if="${dg.so_sao < 5}" th:each="i : ${#numbers.sequence(dg.so_sao + 1, 5)}"></i>
                        </div>
                    </td>

                    <!-- Nội dung -->
                    <td class="py-4 px-4 text-slate-700 max-w-[250px] truncate" th:text="${dg.noi_dung}">Nội dung đánh giá</td>

                    <!-- Ngày tạo -->
                    <td class="py-4 px-4 text-slate-500" th:text="${dg.ngayTao != null ? #temporals.format(dg.ngayTao, 'dd/MM/yyyy HH:mm') : 'Chưa rõ'}">Ngày</td>

                    <!-- Trạng thái -->
                    <td class="py-4 px-4">
                        <span th:if="${dg.trang_thai == true}" class="px-2 py-1 bg-green-100 text-green-600 rounded-full text-[10px] font-bold uppercase">Hiển thị</span>
                        <span th:if="${dg.trang_thai == false}" class="px-2 py-1 bg-amber-100 text-amber-600 rounded-full text-[10px] font-bold uppercase">Ẩn / Chờ duyệt</span>
                    </td>

                    <!-- Thao tác duyệt / xóa -->
                    <td class="py-4 px-4 text-right">
                        <div class="flex justify-end gap-2">
                            <a th:href="@{/admin/danh-gia/toggle(id=${dg.id_danhgia})}"
                               th:class="${dg.trang_thai == true ? 'px-2 py-1 bg-amber-500 text-white rounded-lg text-xs font-bold transition-all active:scale-95 shadow-sm shadow-amber-500/20' : 'px-2 py-1 bg-green-500 text-white rounded-lg text-xs font-bold transition-all active:scale-95 shadow-sm shadow-green-500/20'}"
                               th:text="${dg.trang_thai == true ? 'Ẩn đi' : 'Hiển thị'}">Duyệt</a>
                               
                            <a th:href="@{/admin/danh-gia/delete(id=${dg.id_danhgia})}" onclick="return confirm('Bạn có chắc chắn muốn xóa đánh giá này?')"
                               class="p-1.5 text-slate-400 hover:text-red-500 transition-colors bg-slate-50 rounded-lg hover:bg-white border border-slate-100 shadow-sm flex items-center justify-center">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(reviews)}">
                    <td colspan="7" class="py-8 text-center text-slate-400">Chưa có đánh giá nào từ khách hàng.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout-admin :: layout('Quản lý khuyến mãi', ~{::div#khuyenmai-content})}">
<body>
<div id="khuyenmai-content" class="space-y-6">
    <!-- Messages -->
    <div th:if="${success}" class="p-4 bg-green-50 border border-green-200 text-green-700 rounded-xl flex items-center gap-3">
        <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-center gap-3">
        <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
        <span class="text-sm font-semibold" th:text="${error}"></span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Form thêm / sửa mã giảm giá -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 h-fit">
            <h3 class="font-bold text-slate-900 text-lg mb-6" th:text="${editCoupon != null ? 'Cập nhật mã giảm giá' : 'Tạo mã giảm giá mới'}">Tạo mã mới</h3>
            <form th:action="@{/admin/khuyen-mai/save}" method="POST" class="space-y-4">
                <input type="hidden" name="id_magiamgia" th:value="${editCoupon != null ? editCoupon.id_magiamgia : ''}">
                
                <!-- Mã code -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">Mã code *</label>
                    <input type="text" name="ma_code" required th:value="${editCoupon != null ? editCoupon.ma_code : ''}"
                           placeholder="Ví dụ: SALE15" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary transition-all">
                </div>

                <!-- Loại giảm -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">Loại giảm giá</label>
                    <select name="loai_giam" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary transition-all text-slate-600">
                        <option value="PERCENT" th:selected="${editCoupon != null && editCoupon.loai_giam == 'PERCENT'}">Theo Phần Trăm (%)</option>
                        <option value="FIXED" th:selected="${editCoupon != null && editCoupon.loai_giam == 'FIXED'}">Số tiền cố định (đ)</option>
                    </select>
                </div>

                <!-- Giá trị giảm -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">Giá trị giảm *</label>
                    <input type="number" step="any" min="0" name="gia_tri_giam" required th:value="${editCoupon != null ? editCoupon.gia_tri_giam : ''}"
                           placeholder="Ví dụ: 15 cho 15%, hoặc 50000 cho 50k" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary transition-all">
                </div>

                <!-- Đơn tối thiểu -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">Đơn hàng tối thiểu * (đ)</label>
                    <input type="number" step="any" min="0" name="don_toi_thieu" required th:value="${editCoupon != null ? editCoupon.don_toi_thieu : '0'}"
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary transition-all">
                </div>

                <!-- Số lượng sử dụng -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">Số lượng có sẵn *</label>
                    <input type="number" min="1" name="so_luong" required th:value="${editCoupon != null ? editCoupon.so_luong : '50'}"
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary transition-all">
                </div>

                <!-- Ngày bắt đầu / kết thúc -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-700">Ngày bắt đầu</label>
                        <input type="datetime-local" name="ngayBatDauStr" th:value="${editCouponNgayBatDau}"
                               class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-primary">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-700">Ngày kết thúc</label>
                        <input type="datetime-local" name="ngayKetThucStr" th:value="${editCouponNgayKetThuc}"
                               class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-primary">
                    </div>
                </div>

                <!-- Trạng thái -->
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">Trạng thái kích hoạt</label>
                    <select name="trang_thai" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-primary transition-all text-slate-600">
                        <option value="true" th:selected="${editCoupon == null || editCoupon.trang_thai == true}">Kích hoạt</option>
                        <option value="false" th:selected="${editCoupon != null && editCoupon.trang_thai == false}">Vô hiệu hóa</option>
                    </select>
                </div>

                <div class="flex gap-2 pt-4">
                    <button type="submit" class="flex-1 bg-primary hover:bg-secondary text-white py-3 rounded-xl font-bold transition-all shadow-md shadow-primary/20 active:scale-95 text-sm">
                        Lưu mã giảm giá
                    </button>
                    <a th:href="@{/admin/khuyen-mai}" th:if="${editCoupon != null}"
                       class="px-4 py-3 border border-slate-200 rounded-xl font-bold text-slate-500 hover:bg-slate-50 transition-all text-sm flex items-center justify-center">
                        Hủy
                    </a>
                </div>
            </form>
        </div>

        <!-- Bảng danh sách mã giảm giá -->
        <div class="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-slate-100 p-6 overflow-hidden">
            <h3 class="font-bold text-slate-900 text-lg mb-6">Mã giảm giá hiện khả dụng</h3>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                    <tr class="text-left text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100">
                        <th class="pb-4 px-4">Mã Code</th>
                        <th class="pb-4 px-4">Loại / Trị giá</th>
                        <th class="pb-4 px-4">Yêu cầu tối thiểu</th>
                        <th class="pb-4 px-4">Hạn dùng</th>
                        <th class="pb-4 px-4">Lượt sử dụng</th>
                        <th class="pb-4 px-4">Trạng thái</th>
                        <th class="pb-4 px-4 text-right">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                    <tr th:each="coupon : ${coupons}" class="text-sm group hover:bg-slate-50 transition-colors">
                        <!-- Code -->
                        <td class="py-4 px-4">
                            <span class="px-2.5 py-1 bg-primary/10 text-primary font-bold rounded-lg" th:text="${coupon.ma_code}">SALE</span>
                        </td>

                        <!-- Trị giá -->
                        <td class="py-4 px-4 font-semibold text-slate-900">
                            <span th:if="${coupon.loai_giam == 'PERCENT'}" th:text="'-' + ${coupon.gia_tri_giam} + '%'">10%</span>
                            <span th:if="${coupon.loai_giam == 'FIXED'}" th:text="'-' + ${#numbers.formatDecimal(coupon.gia_tri_giam, 0, 'COMMA', 0, 'POINT')} + 'đ'">10.000đ</span>
                        </td>

                        <!-- Đơn tối thiểu -->
                        <td class="py-4 px-4 text-slate-500" th:text="${#numbers.formatDecimal(coupon.don_toi_thieu, 0, 'COMMA', 0, 'POINT')} + 'đ'">Đơn > 0đ</td>

                        <!-- Hạn dùng -->
                        <td class="py-4 px-4 text-slate-500 text-xs">
                            <div th:if="${coupon.ngayBatDau != null && coupon.ngayKetThuc != null}">
                                <p th:text="'Bắt đầu: ' + ${#temporals.format(coupon.ngayBatDau, 'dd/MM/yyyy')}"></p>
                                <p th:text="'Kết thúc: ' + ${#temporals.format(coupon.ngayKetThuc, 'dd/MM/yyyy')}"></p>
                            </div>
                            <span th:if="${coupon.ngayBatDau == null || coupon.ngayKetThuc == null}" class="text-slate-400 italic">Vô thời hạn</span>
                        </td>

                        <!-- Lượt sử dụng -->
                        <td class="py-4 px-4 text-slate-600">
                            <span class="font-bold text-slate-900" th:text="${coupon.da_su_dung}">0</span>
                            <span th:text="' / ' + ${coupon.so_luong != null ? coupon.so_luong : '∞'}">/ 100</span>
                        </td>

                        <!-- Trạng thái -->
                        <td class="py-4 px-4">
                            <span th:if="${coupon.isValid()}" class="px-2 py-1 bg-green-100 text-green-600 rounded-full text-[10px] font-bold uppercase">Hiệu lực</span>
                            <span th:if="${!coupon.isValid()}" class="px-2 py-1 bg-red-100 text-red-600 rounded-full text-[10px] font-bold uppercase">Hết hạn / Ẩn</span>
                        </td>

                        <!-- Thao tác -->
                        <td class="py-4 px-4 text-right">
                            <div class="flex justify-end gap-2">
                                <a th:href="@{/admin/khuyen-mai(editId=${coupon.id_magiamgia})}" class="p-2 text-slate-400 hover:text-primary transition-colors bg-slate-50 rounded-xl hover:bg-white border border-slate-100 shadow-sm">
                                    <i data-lucide="edit-3" class="w-5 h-5"></i>
                                </a>
                                <a th:href="@{/admin/khuyen-mai/delete(id=${coupon.id_magiamgia})}" onclick="return confirm('Bạn có chắc chắn muốn xóa mã giảm giá này?')"
                                   class="p-2 text-slate-400 hover:text-red-500 transition-colors bg-slate-50 rounded-xl hover:bg-white border border-slate-100 shadow-sm">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(coupons)}">
                        <td colspan="7" class="py-8 text-center text-slate-400">Chưa có chương trình khuyến mãi nào.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>

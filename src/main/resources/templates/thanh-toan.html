<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Thanh toán</title>
</head>
<body>
<div layout:fragment="content" class="container">
    <div class="row">
        <div class="col-md-7">
            <div class="bg-white p-4 shadow-sm rounded mb-4">
                <h5 class="fw-bold mb-4">THÔNG TIN GIAO HÀNG</h5>
                <form th:action="@{/checkout/confirm}" method="post">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Địa chỉ nhận hàng</label>
                        <textarea class="form-control" name="address" rows="3" placeholder="Số nhà, tên đường, phường/xã..." required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Ghi chú</label>
                        <input type="text" class="form-control" name="note" placeholder="Ví dụ: Giao giờ hành chính">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Phương thức thanh toán</label>
                        <div class="form-check border p-3 rounded mb-2">
                            <input class="form-check-input ms-1" type="radio" name="payment" id="cod" checked>
                            <label class="form-check-label ms-4" for="cod">Thanh toán khi nhận hàng (COD)</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-huit w-100 py-3 fw-bold">XÁC NHẬN ĐẶT HÀNG</button>
                </form>
            </div>
        </div>

        <div class="col-md-5">
            <div class="bg-light p-4 shadow-sm rounded border">
                <h5 class="fw-bold mb-4 text-center">TÓM TẮT ĐƠN HÀNG</h5>
                <div class="d-flex justify-content-between mb-2">
                    <span class="small">Tổng tiền hàng:</span>
                    <span class="fw-bold">0 đ</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="small">Phí vận chuyển:</span>
                    <span class="fw-bold text-success">Miễn phí</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between">
                    <h5 class="fw-bold text-huit">TỔNG CỘNG:</h5>
                    <h4 class="fw-bold text-danger">0 đ</h4>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

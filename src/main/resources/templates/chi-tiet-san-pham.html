<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Chi tiết sản phẩm</title></head>
<body>
<div layout:fragment="content" class="container">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-huit">Trang chủ</a></li>
            <li class="breadcrumb-item active" th:text="${sanPham.ten_sanpham}">Tên sản phẩm</li>
        </ol>
    </nav>

    <div class="row bg-white p-4 shadow-sm rounded">
        <div class="col-md-5 text-center border-end">
            <img th:src="${sanPham.hinh_anh}" class="img-fluid rounded" style="max-height: 400px;" alt="Sản phẩm">
        </div>

        <div class="col-md-7 ps-md-5">
            <h2 class="fw-bold text-dark mb-3" th:text="${sanPham.ten_sanpham}">Tên sản phẩm</h2>
            <div class="mb-3">
                <span class="text-muted small">Mã SP: </span><span class="fw-bold" th:text="${sanPham.id_sanpham}">001</span>
            </div>
            <h3 class="text-danger fw-bold mb-4" th:text="${#numbers.formatDecimal(sanPham.gia, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</h3>

            <div class="mb-4 py-3 border-top border-bottom">
                <h6 class="fw-bold text-huit">Mô tả sản phẩm:</h6>
                <p class="text-muted small" th:text="${sanPham.mo_ta}">Mô tả chi tiết ở đây...</p>
            </div>

            <form th:action="@{/cart/add}" method="post" class="d-flex gap-3">
                <input type="hidden" name="id" th:value="${sanPham.id_sanpham}">
                <div class="input-group" style="width: 130px;">
                    <span class="input-group-text">SL</span>
                    <input type="number" name="quantity" class="form-control text-center" value="1" min="1">
                </div>
                <button type="submit" class="btn btn-huit px-5 fw-bold">
                    <i class="fa-solid fa-cart-plus me-2"></i> THÊM VÀO GIỎ HÀNG
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>

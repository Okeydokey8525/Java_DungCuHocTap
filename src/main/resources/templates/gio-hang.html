<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Giỏ hàng', ~{::div#cart-content})}">
<body>
<div id="cart-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="text-3xl font-extrabold text-slate-900 mb-12">Giỏ hàng của bạn <span class="text-slate-400 font-normal text-xl ml-2" th:text="'(' + ${cartCount} + ' sản phẩm)'">(0 sản phẩm)</span></h1>

    <div class="grid lg:grid-cols-3 gap-8">
        <!-- Cart Items -->
        <div class="lg:col-span-2 space-y-6">
            <!-- Select All Bar -->
            <div th:if="${cartItems != null and !cartItems.isEmpty()}" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex items-center justify-between">
                <label class="flex items-center gap-3 cursor-pointer group text-sm font-semibold text-slate-600 hover:text-primary transition-colors">
                    <input type="checkbox" id="select-all" class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer" checked onchange="toggleSelectAll(this)">
                    <span>Chọn tất cả sản phẩm</span>
                </label>
                <button onclick="removeSelectedCartItems()" class="text-sm font-bold text-red-500 hover:text-red-700 hover:underline flex items-center gap-1.5 transition-colors">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    Xóa mục đã chọn
                </button>
            </div>

            <div th:if="${cartItems != null and !cartItems.isEmpty()}" th:each="item : ${cartItems}" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col sm:flex-row items-center gap-6 cart-item" th:data-product-id="${item.sanPham.id_sanpham}">
                <!-- Checkbox chọn sản phẩm -->
                <div class="flex-shrink-0 flex items-center">
                    <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary item-checkbox cursor-pointer" th:data-product-id="${item.sanPham.id_sanpham}" checked onchange="calculateCartTotal()">
                </div>
                <div class="w-24 h-24 bg-slate-50 rounded-xl overflow-hidden flex-shrink-0">
                    <img th:src="${item.sanPham.hinh_anh}" class="w-full h-full object-cover" alt="Product image">
                </div>
                <div class="flex-1 space-y-1">
                    <h3 class="font-bold text-slate-900 hover:text-primary transition-colors">
                        <a th:href="@{'/san-pham/' + ${item.sanPham.id_sanpham}}" th:text="${item.sanPham.ten_sanpham}">Tên sản phẩm</a>
                    </h3>
                    <p class="text-sm text-slate-500" th:text="'Danh mục: ' + (${item.sanPham.danhMuc != null ? item.sanPham.danhMuc.ten_danhmuc : 'Chưa phân loại'})">Danh mục</p>
                    <div class="text-primary font-bold">
                        <span th:text="${#numbers.formatDecimal(item.sanPham.gia_giam != null ? item.sanPham.gia_giam : item.sanPham.gia, 0, 'COMMA', 0, 'POINT') + ' đ'}">0đ</span>
                        <span class="text-xs text-slate-400 line-through ml-2" th:if="${item.sanPham.gia_giam != null}" th:text="${#numbers.formatDecimal(item.sanPham.gia, 0, 'COMMA', 0, 'POINT')} + ' đ'">0đ</span>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center border border-slate-200 rounded-lg overflow-hidden">
                        <button class="p-2 hover:bg-slate-50 quantity-btn" th:data-action="decrease" th:data-product-id="${item.sanPham.id_sanpham}">
                            <i data-lucide="minus" class="w-3 h-3"></i>
                        </button>
                        <input type="number" th:value="${item.so_luong}" class="w-10 text-center font-bold border-none focus:ring-0 text-sm quantity-input" th:data-product-id="${item.sanPham.id_sanpham}" min="1">
                        <button class="p-2 hover:bg-slate-50 quantity-btn" th:data-action="increase" th:data-product-id="${item.sanPham.id_sanpham}">
                            <i data-lucide="plus" class="w-3 h-3"></i>
                        </button>
                    </div>
                    <div class="text-right min-w-[80px]">
                        <div class="font-bold text-slate-900 item-total" th:data-product-id="${item.sanPham.id_sanpham}" 
                             th:text="${#numbers.formatDecimal((item.sanPham.gia_giam != null ? item.sanPham.gia_giam : item.sanPham.gia) * item.so_luong, 0, 'COMMA', 0, 'POINT') + ' đ'}">0đ</div>
                        <button class="text-xs text-red-500 hover:underline remove-btn" th:data-product-id="${item.sanPham.id_sanpham}">Xóa</button>
                    </div>
                </div>
            </div>

            <!-- Empty Cart Message -->
            <div th:if="${cartItems == null or cartItems.isEmpty()}" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-12 text-center">
                <i data-lucide="shopping-cart" class="w-16 h-16 text-slate-300 mx-auto mb-4"></i>
                <h3 class="text-xl font-bold text-slate-900 mb-2">Giỏ hàng trống</h3>
                <p class="text-slate-500 mb-6">Bạn chưa có sản phẩm nào trong giỏ hàng</p>
                <a th:href="@{/home}" class="bg-primary hover:bg-secondary text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-primary/20 active:scale-95 inline-flex items-center gap-2">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    Tiếp tục mua sắm
                </a>
            </div>
        </div>

        <!-- Summary -->
        <div class="space-y-6" th:if="${cartItems != null and !cartItems.isEmpty()}">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-6">
                <h3 class="text-xl font-bold text-slate-900">Tổng đơn hàng</h3>
                <div class="space-y-4 text-sm font-medium">
                    <div class="flex justify-between text-slate-500">
                        <span>Tạm tính:</span>
                        <span class="text-slate-900" id="subtotal" th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT') + ' đ'}">0đ</span>
                    </div>
                    <div class="flex justify-between text-slate-500">
                        <span>Phí vận chuyển:</span>
                        <span class="text-slate-900" id="shipping" th:text="${cartTotal >= 1000000 ? 'Miễn phí' : #numbers.formatDecimal(30000, 0, 'COMMA', 0, 'POINT') + ' đ'}">Miễn phí</span>
                    </div>
                    <div class="pt-4 border-t border-slate-100 flex justify-between text-lg font-black text-primary">
                        <span>Tổng cộng:</span>
                        <span id="total" th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT') + ' đ'}">0đ</span>
                    </div>
                </div>
                <a id="checkout-btn" th:href="@{/checkout}" class="bg-primary hover:bg-secondary text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-primary/20 active:scale-95 flex items-center justify-center gap-2 w-full font-bold">
                    Thanh toán ngay
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Khởi tạo tính tổng tiền ban đầu
            calculateCartTotal();

            // Quantity buttons
            document.querySelectorAll('.quantity-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const productId = this.dataset.productId;
                    const action = this.dataset.action;
                    const input = document.querySelector(`.quantity-input[data-product-id="${productId}"]`);
                    let currentQuantity = parseInt(input.value);
                    
                    if (action === 'increase') {
                        currentQuantity++;
                        updateCartQuantity(productId, currentQuantity);
                    } else if (action === 'decrease') {
                        if (currentQuantity > 1) {
                            currentQuantity--;
                            updateCartQuantity(productId, currentQuantity);
                        } else if (currentQuantity === 1) {
                            if (confirm('Bạn có chắc muốn xóa sản phẩm này khỏi giỏ hàng?')) {
                                removeFromCart(productId);
                            }
                        }
                    }
                });
            });

            // Quantity input change
            document.querySelectorAll('.quantity-input').forEach(input => {
                input.addEventListener('change', function() {
                    const productId = this.dataset.productId;
                    let quantity = parseInt(this.value);
                    
                    if (isNaN(quantity) || quantity < 0) {
                        quantity = 1;
                        this.value = quantity;
                        updateCartQuantity(productId, quantity);
                    } else if (quantity === 0) {
                        if (confirm('Bạn có chắc muốn xóa sản phẩm này khỏi giỏ hàng?')) {
                            removeFromCart(productId);
                        } else {
                            this.value = 1;
                            updateCartQuantity(productId, 1);
                        }
                    } else {
                        updateCartQuantity(productId, quantity);
                    }
                });
            });

            // Remove buttons
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const productId = this.dataset.productId;
                    if (confirm('Bạn có chắc muốn xóa sản phẩm này khỏi giỏ hàng?')) {
                        removeFromCart(productId);
                    }
                });
            });
        });

        function toggleSelectAll(checkbox) {
            const isChecked = checkbox.checked;
            document.querySelectorAll('.item-checkbox').forEach(itemCb => {
                itemCb.checked = isChecked;
            });
            calculateCartTotal();
        }

        function calculateCartTotal() {
            let total = 0;
            let checkedCount = 0;
            const items = document.querySelectorAll('.cart-item');
            
            items.forEach(item => {
                const cb = item.querySelector('.item-checkbox');
                if (cb.checked) {
                    checkedCount++;
                    const priceElement = item.querySelector('.text-primary span:first-child');
                    const price = parseFloat(priceElement.textContent.replace(/[^\d]/g, ''));
                    const qtyInput = item.querySelector('.quantity-input');
                    const qty = parseInt(qtyInput.value);
                    total += price * qty;
                }
            });
            
            // Cập nhật trạng thái checkbox "Chọn tất cả"
            const selectAllCb = document.getElementById('select-all');
            if (selectAllCb) {
                selectAllCb.checked = checkedCount === items.length && items.length > 0;
            }
            
            // Cập nhật tạm tính
            document.getElementById('subtotal').textContent = formatCurrency(total);
            
            // Tính phí vận chuyển (Ví dụ đơn dưới 500k phí 30k, dưới 1 triệu phí 20k, từ 1tr freeship)
            let shippingFee = 0;
            if (total > 0) {
                if (total < 500000) {
                    shippingFee = 30000;
                } else if (total < 1000000) {
                    shippingFee = 20000;
                }
            }
            
            const shippingElement = document.getElementById('shipping');
            if (shippingFee === 0) {
                shippingElement.textContent = total > 0 ? 'Miễn phí' : '0 đ';
            } else {
                shippingElement.textContent = formatCurrency(shippingFee);
            }
            
            const grandTotal = total + shippingFee;
            document.getElementById('total').textContent = formatCurrency(grandTotal);
            
            // Cập nhật link Thanh toán ngay kèm danh sách sản phẩm được chọn
            const checkoutBtn = document.getElementById('checkout-btn');
            if (checkoutBtn) {
                if (checkedCount === 0) {
                    checkoutBtn.classList.add('opacity-50', 'pointer-events-none');
                    checkoutBtn.setAttribute('href', '#');
                } else {
                    checkoutBtn.classList.remove('opacity-50', 'pointer-events-none');
                    const selectedIds = Array.from(document.querySelectorAll('.item-checkbox:checked'))
                                             .map(cb => cb.dataset.productId)
                                             .join(',');
                    checkoutBtn.setAttribute('href', `/checkout?items=${selectedIds}`);
                }
            }
        }

        function updateCartQuantity(productId, quantity) {
            fetch('/cart/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `sanPhamId=${productId}&soLuong=${quantity}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Update UI
                    document.querySelector(`.quantity-input[data-product-id="${productId}"]`).value = quantity;
                    
                    // Update item total
                    const priceElement = document.querySelector(`.cart-item[data-product-id="${productId}"] .text-primary span:first-child`);
                    const price = parseFloat(priceElement.textContent.replace(/[^\d]/g, ''));
                    const totalElement = document.querySelector(`.item-total[data-product-id="${productId}"]`);
                    totalElement.textContent = formatCurrency(price * quantity);
                    
                    // Recalculate totals
                    calculateCartTotal();
                    
                    // Show success message using global toast
                    if (typeof showToast === 'function') {
                        showToast(data.message, 'success');
                    }
                    
                    // Update header badge
                    const badge = document.getElementById('cart-badge-count');
                    if (badge) {
                        badge.textContent = data.cartCount;
                    }
                } else {
                    if (typeof showToast === 'function') {
                        showToast(data.message, 'error');
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                if (typeof showToast === 'function') {
                    showToast('Có lỗi xảy ra', 'error');
                }
            });
        }

        function removeFromCart(productId) {
            fetch('/cart/remove', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `sanPhamId=${productId}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Remove item from DOM
                    const itemElement = document.querySelector(`.cart-item[data-product-id="${productId}"]`);
                    itemElement.remove();
                    
                    // Check if cart is empty or update totals
                    const remainingItems = document.querySelectorAll('.cart-item');
                    if (remainingItems.length === 0) {
                        location.reload();
                    } else {
                        calculateCartTotal();
                        if (typeof showToast === 'function') {
                            showToast(data.message, 'success');
                        }
                    }
                    
                    // Update header badge
                    const badge = document.getElementById('cart-badge-count');
                    if (badge) {
                        badge.textContent = data.cartCount;
                    }
                } else {
                    if (typeof showToast === 'function') {
                        showToast(data.message, 'error');
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                if (typeof showToast === 'function') {
                    showToast('Có lỗi xảy ra', 'error');
                }
            });
        }

        function removeSelectedCartItems() {
            const checkedCbs = document.querySelectorAll('.item-checkbox:checked');
            if (checkedCbs.length === 0) {
                if (typeof showToast === 'function') {
                    showToast('Vui lòng chọn ít nhất một sản phẩm để xóa', 'error');
                }
                return;
            }
            
            if (confirm('Bạn có chắc chắn muốn xóa các sản phẩm đã chọn khỏi giỏ hàng?')) {
                const promises = Array.from(checkedCbs).map(cb => {
                    const productId = cb.dataset.productId;
                    return fetch('/cart/remove', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: `sanPhamId=${productId}`
                    }).then(res => res.json());
                });
                
                Promise.all(promises).then(results => {
                    location.reload();
                }).catch(() => {
                    if (typeof showToast === 'function') {
                        showToast('Có lỗi xảy ra khi xóa các sản phẩm', 'error');
                    }
                });
            }
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('vi-VN').format(amount) + ' đ';
        }
    </script>
</div>
</body>
</html>
